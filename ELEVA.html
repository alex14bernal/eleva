<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0E0F13">
<title>ELEVA · Rendimiento para baloncesto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E0F13; --bg2:#0B0C10; --card:#181A20; --card2:#1F222A; --line:#282C36;
  --txt:#F4F5F7; --muted:#9AA0AD; --dim:#6B7280;
  --acc:#FF6A2C; --acc-soft:rgba(255,106,44,.14); --acc-dim:rgba(255,106,44,.35);
  --ok:#3FB68B; --ok-soft:rgba(63,182,139,.14);
  --blue:#5AA9E6; --blue-soft:rgba(90,169,230,.14);
  --purple:#B084E8; --purple-soft:rgba(176,132,232,.14);
  --radius:18px; --radius-sm:12px;
  --shadow:0 8px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,-apple-system,sans-serif}
body{max-width:480px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
a{color:inherit;text-decoration:none}
.icon{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;display:block}
.icon.sm{width:18px;height:18px}
.icon.lg{width:28px;height:28px}

#app{padding:0 0 92px}
.header{padding:26px 20px 6px;display:flex;align-items:center;justify-content:space-between}
.header .hi{font-size:13px;color:var(--muted);font-weight:500}
.header h1{font-size:24px;margin:2px 0 0;font-weight:800;letter-spacing:-.5px}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--card2);border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}

.section{padding:14px 20px}
.section-title{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 12px}
.section-title h2{font-size:15px;font-weight:700;margin:0;letter-spacing:-.2px}
.section-title .link{font-size:12.5px;color:var(--acc);font-weight:600;display:flex;align-items:center;gap:2px}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.card+.card{margin-top:12px}

.hero{background:linear-gradient(160deg,#20140D 0%,#181A20 60%);border:1px solid #34281F;border-radius:22px;padding:20px;position:relative;overflow:hidden}
.hero.court{background:linear-gradient(160deg,#0E2136 0%,#181A20 60%);border-color:#1F3A52}
.hero:before{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:radial-gradient(circle,var(--acc-soft),transparent 70%)}
.hero.court:before{background:radial-gradient(circle,var(--blue-soft),transparent 70%)}
.hero .tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--acc);background:var(--acc-soft);padding:5px 10px;border-radius:100px}
.hero.court .tag{color:var(--blue);background:var(--blue-soft)}
.hero h3{font-size:22px;margin:14px 0 4px;font-weight:800;letter-spacing:-.4px}
.hero p{margin:0;color:var(--muted);font-size:13.5px;line-height:1.5}
.hero .meta{display:flex;gap:18px;margin:16px 0 18px}
.hero .meta div{display:flex;flex-direction:column}
.hero .meta b{font-size:16px;font-weight:700}
.hero .meta span{font-size:11px;color:var(--dim);margin-top:1px}
.btn{width:100%;background:var(--acc);color:#160B05;font-weight:700;font-size:15px;padding:15px;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 20px var(--acc-dim);transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--card2);color:var(--txt);box-shadow:none;border:1px solid var(--line)}
.btn.blue{background:var(--blue);color:#04121F;box-shadow:0 8px 20px rgba(90,169,230,.3)}
.btn.sm{padding:11px;font-size:13.5px;border-radius:11px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 12px;text-align:center}
.stat .icon{margin:0 auto 8px;color:var(--acc)}
.stat b{font-size:20px;font-weight:800;display:block;letter-spacing:-.5px}
.stat span{font-size:11px;color:var(--muted)}

.week{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;scrollbar-width:none}
.week::-webkit-scrollbar{display:none}
.daychip{flex:0 0 auto;min-width:118px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 14px;position:relative}
.daychip .d{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.daychip .n{font-size:14px;font-weight:700;margin:5px 0 2px}
.daychip .f{font-size:11.5px;color:var(--muted)}
.daychip.today{border-color:var(--acc-dim);background:linear-gradient(160deg,#20140D,var(--card))}
.daychip.court.today{border-color:#1F3A52;background:linear-gradient(160deg,#0E2136,var(--card))}

.dayselect{display:flex;gap:8px;overflow-x:auto;padding:4px 20px 8px;scrollbar-width:none}
.dayselect::-webkit-scrollbar{display:none}
.pill{flex:0 0 auto;padding:10px 15px;border-radius:100px;background:var(--card);border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap}
.pill.active{background:var(--acc);color:#160B05;border-color:var(--acc)}

.ex{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin:0 20px 12px;display:flex;gap:13px;align-items:flex-start;transition:border-color .15s}
.ex.done{border-color:var(--ok-soft);background:linear-gradient(0deg,var(--ok-soft),var(--card))}
.ex .num{flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:var(--card2);display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--muted)}
.ex.done .num{background:var(--ok);color:#06251A}
.ex .body{flex:1;min-width:0}
.ex .name{font-size:14.5px;font-weight:700;letter-spacing:-.2px}
.ex .scheme{display:flex;gap:14px;margin:7px 0 6px;flex-wrap:wrap}
.ex .scheme span{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.ex .scheme b{color:var(--txt);font-weight:700}
.ex .cue{font-size:12px;color:var(--dim);line-height:1.45}
.ex .actions{display:flex;gap:8px;margin-top:11px}
.chip-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:8px 12px;border-radius:10px;background:var(--card2);border:1px solid var(--line);color:var(--txt)}
.chip-btn.vid{color:var(--acc);border-color:var(--acc-dim);background:var(--acc-soft)}
.check{flex:0 0 auto;width:26px;height:26px;border-radius:8px;border:1.8px solid var(--line);display:grid;place-items:center;color:transparent}
.ex.done .check{background:var(--ok);border-color:var(--ok);color:#06251A}
.wt{display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap}
.wt-l{font-size:11px;color:var(--dim);font-weight:600}
.wt-in{width:64px;padding:8px 8px;border-radius:9px;background:var(--card2);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:700;text-align:center}
.wt-save{font-size:12px;font-weight:700;padding:8px 12px;border-radius:9px;background:var(--acc-soft);color:var(--acc);border:1px solid var(--acc-dim)}
.wt-pr{font-size:11px;color:var(--ok);font-weight:700}
.log-ic.cardio{background:var(--purple-soft);color:var(--purple)}
.log-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.cell .dot.cardio{background:var(--purple)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip-sel{padding:9px 13px;border-radius:100px;background:var(--card2);border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--muted)}
.chip-sel.on{background:var(--acc);color:#160B05;border-color:var(--acc)}
.pcard{background:linear-gradient(160deg,#20140D,var(--card));border:1px solid #34281F;border-radius:16px;padding:15px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.pcard .pc-ic{width:44px;height:44px;border-radius:13px;background:var(--acc-soft);color:var(--acc);display:grid;place-items:center;flex:0 0 auto}
.pcard .pc-t{flex:1}
.pcard .pc-t b{font-size:14.5px;font-weight:700;display:block}
.pcard .pc-t span{font-size:12px;color:var(--muted)}
.pcard .pc-v{text-align:right}
.pcard .pc-v b{font-size:20px;font-weight:800;display:block;letter-spacing:-.5px}
.pcard .pc-v.none b{font-size:13px;color:var(--dim)}
.pcard .pc-v span{font-size:10.5px;color:var(--dim)}

.warm{margin:0 20px 14px;padding:13px 15px;border-radius:14px;background:var(--card2);border:1px dashed var(--line);font-size:12.5px;color:var(--muted);line-height:1.5;display:flex;gap:10px}
.warm .icon{color:var(--acc);flex:0 0 auto;margin-top:1px}

/* stretch accordion */
.stretch{margin:0 20px 12px;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.stretch>summary{list-style:none;cursor:pointer;padding:15px;display:flex;align-items:center;gap:12px}
.stretch>summary::-webkit-details-marker{display:none}
.stretch .s-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}
.stretch.pre .s-ic{background:var(--blue-soft);color:var(--blue)}
.stretch.post .s-ic{background:var(--ok-soft);color:var(--ok)}
.stretch .s-tt{flex:1}
.stretch .s-tt b{font-size:14px;font-weight:700;display:block}
.stretch .s-tt span{font-size:11.5px;color:var(--dim)}
.stretch .chev{color:var(--dim);transition:transform .2s}
.stretch[open] .chev{transform:rotate(90deg)}
.stretch .s-body{padding:0 15px 6px}
.st-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
.st-item .t{flex:1;min-width:0}
.st-item .t b{font-size:13px;font-weight:600;display:block}
.st-item .t span{font-size:11px;color:var(--dim)}
.st-act{display:flex;gap:14px;align-items:center;flex:0 0 auto}
.st-act a,.st-act .tplay{color:var(--acc)}
.stretch.pre .st-act .tplay{color:var(--blue)}
.st-act .tplay{padding:0}

.timer{position:fixed;inset:0;background:rgba(8,9,12,.97);z-index:300;display:none;align-items:center;justify-content:center;padding:24px}
.timer.open{display:flex}
.tm-inner{text-align:center;width:100%;max-width:340px}
.tm-step{font-size:11px;color:var(--dim);font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.tm-name{font-size:20px;font-weight:800;margin:8px 12px 0;letter-spacing:-.3px}
.tm-ringwrap{position:relative;width:230px;height:230px;margin:24px auto 6px}
.tm-ringwrap svg{transform:rotate(-90deg)}
.tm-num{position:absolute;inset:0;display:grid;place-items:center;font-size:60px;font-weight:800;letter-spacing:-2px}
.tm-sub{font-size:16px;font-weight:600;color:var(--muted)}
.tm-controls{display:flex;gap:10px;margin-top:28px}
.tm-controls button{flex:1;padding:14px 8px;border-radius:12px;background:var(--card2);border:1px solid var(--line);font-weight:700;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--txt)}
.tm-controls button.primary{background:var(--acc);color:#160B05;border-color:var(--acc)}

.progressbar{height:6px;background:var(--card2);border-radius:100px;overflow:hidden;margin:0 20px 4px}
.progressbar i{display:block;height:100%;background:var(--acc);border-radius:100px;transition:width .3s}

.cal{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 10px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.cal-head b{font-size:14px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.cal-grid .wd{font-size:9px;color:var(--dim);font-weight:600;padding:1px 0}
.cell{aspect-ratio:1;min-width:0;border-radius:7px;display:grid;place-items:center;font-size:11px;color:var(--muted);position:relative;background:var(--bg2)}
.cell.empty{background:transparent}
.cell.today{outline:1.5px solid var(--acc);color:var(--acc);font-weight:700}
.cell .dot{position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%}
.cell .dot.gym{background:var(--acc)}
.cell .dot.clase{background:var(--blue)}
.cell .dot.bball{background:var(--ok)}

.legend{display:flex;gap:14px;margin:12px 2px 0;flex-wrap:wrap}
.legend span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
.legend i{width:8px;height:8px;border-radius:50%;display:inline-block}

.log-item{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
.log-item:last-child{border-bottom:none}
.log-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto}
.log-ic.gym{background:var(--acc-soft);color:var(--acc)}
.log-ic.clase{background:var(--blue-soft);color:var(--blue)}
.log-ic.bball{background:var(--ok-soft);color:var(--ok)}
.log-item .t{flex:1;min-width:0}
.log-item .t b{font-size:13.5px;font-weight:700;display:block}
.log-item .t span{font-size:11.5px;color:var(--dim)}
.log-item .day{font-size:11px;color:var(--muted);text-align:right;white-space:nowrap}

.empty{text-align:center;padding:34px 20px;color:var(--dim)}
.empty .icon{margin:0 auto 12px;color:var(--line);width:40px;height:40px}
.empty b{display:block;font-size:14px;color:var(--muted);font-weight:600;margin-bottom:4px}
.empty p{margin:0;font-size:12.5px;line-height:1.5}

.lead-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.lead-item:last-child{border-bottom:none}
.rank{width:24px;font-size:14px;font-weight:800;color:var(--dim);text-align:center}
.rank.top{color:var(--acc)}
.pfp{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:14px;flex:0 0 auto;color:#160B05;overflow:hidden}
.pfp img{width:100%;height:100%;object-fit:cover}
.lead-item .t{flex:1;min-width:0}
.lead-item .t b{font-size:13.5px;font-weight:700;display:block}
.lead-item .t span{font-size:11.5px;color:var(--dim)}
.lead-item .pts{text-align:right}
.lead-item .pts b{font-size:15px;font-weight:800}
.lead-item .pts span{font-size:10.5px;color:var(--dim);display:block}

.challenge{background:linear-gradient(160deg,#20140D,var(--card));border:1px solid #34281F;border-radius:16px;padding:15px;margin-bottom:12px}
.challenge .top{display:flex;justify-content:space-between;align-items:flex-start}
.challenge .top b{font-size:14.5px;font-weight:700}
.challenge .st{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--acc);background:var(--acc-soft);padding:4px 9px;border-radius:100px}
.challenge p{margin:6px 0 12px;font-size:12.5px;color:var(--muted);line-height:1.5}
.vs{display:flex;align-items:center;gap:10px}
.vs .who{flex:1;text-align:center}
.vs .who .pfp{margin:0 auto 5px}
.vs .who b{font-size:12px;display:block}
.vs .who span{font-size:16px;font-weight:800}
.vs .sep{font-size:11px;color:var(--dim);font-weight:700}

.badges{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.badge{text-align:center}
.badge .b-ic{width:100%;aspect-ratio:1;border-radius:16px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;color:var(--dim)}
.badge.on .b-ic{background:var(--acc-soft);border-color:var(--acc-dim);color:var(--acc)}
.badge span{font-size:10px;color:var(--muted);display:block;margin-top:6px;line-height:1.2}

.prof-head{display:flex;align-items:center;gap:15px;padding:6px 2px 18px}
.prof-head .pfp{width:64px;height:64px;font-size:22px}
.prof-head .info{flex:1}
.prof-head b{font-size:19px;font-weight:800;display:block}
.prof-head span{font-size:12.5px;color:var(--muted)}
.edit-btn{width:38px;height:38px;border-radius:11px;background:var(--card2);border:1px solid var(--line);display:grid;place-items:center;color:var(--muted)}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.metric{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center}
.metric b{font-size:18px;font-weight:800;display:block;letter-spacing:-.5px}
.metric span{font-size:10.5px;color:var(--muted);display:block;margin-top:2px}
.imc-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;display:inline-block;margin-top:4px}

.rec{display:flex;align-items:center;gap:13px;padding:14px 0;border-bottom:1px solid var(--line)}
.rec:last-child{border-bottom:none}
.rec .icon{color:var(--acc);flex:0 0 auto}
.rec .t{flex:1}
.rec .t b{font-size:13.5px;display:block}
.rec .t span{font-size:11.5px;color:var(--dim)}
.rec .val{font-size:17px;font-weight:800}
.rec .val small{font-size:11px;color:var(--muted);font-weight:600}
.rec .val.none{color:var(--dim);font-size:14px}

.wlog{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.wlog:last-child{border-bottom:none}
.wlog .icon{color:var(--blue);flex:0 0 auto}
.wlog .t{flex:1}
.wlog .t b{font-size:14px;font-weight:700}
.wlog .t span{font-size:11px;color:var(--dim);display:block}
.wlog .delta{font-size:12px;font-weight:700}
.wlog .delta.up{color:#E06B6B}.wlog .delta.down{color:var(--ok)}

.goal{display:flex;gap:11px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
.goal:last-child{border-bottom:none}
.goal .icon{color:var(--acc);flex:0 0 auto;margin-top:1px}
.goal p{margin:0;font-size:13px;line-height:1.45}
.info-card{display:flex;gap:12px;align-items:center;padding:15px;background:var(--card);border:1px solid var(--line);border-radius:16px}
.info-card .ci{width:38px;height:38px;border-radius:11px;background:var(--acc-soft);color:var(--acc);display:grid;place-items:center;flex:0 0 auto}
.info-card .t{flex:1}
.info-card .t b{font-size:13.5px;display:block}
.info-card .t span{font-size:11.5px;color:var(--dim)}
.note{font-size:11.5px;color:var(--dim);line-height:1.55;padding:4px 2px}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(14,15,19,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:9px 6px calc(9px + env(safe-area-inset-bottom));z-index:50}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);flex:1;padding:4px 0}
.nav button.active{color:var(--acc)}
.nav button span{font-size:10px;font-weight:600}

.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;justify-content:center}
.sheet-bg.open{display:flex}
.sheet{width:100%;max-width:480px;background:var(--card);border-radius:22px 22px 0 0;border-top:1px solid var(--line);padding:22px 20px calc(24px + env(safe-area-inset-bottom));animation:up .28s cubic-bezier(.2,.9,.3,1);max-height:88vh;overflow-y:auto}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet h3{margin:0 0 4px;font-size:18px;font-weight:800}
.sheet .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
.sheet ol{margin:0 0 4px;padding-left:20px}
.sheet ol li{font-size:13px;line-height:1.6;color:var(--muted);margin-bottom:8px}
.sheet ol li b{color:var(--txt)}
.opt{display:flex;align-items:center;gap:13px;padding:15px;border-radius:14px;background:var(--card2);border:1px solid var(--line);margin-bottom:10px;width:100%}
.opt .icon{flex:0 0 auto}
.opt b{font-size:14px;font-weight:700;flex:1;text-align:left}
.grip{width:40px;height:4px;border-radius:100px;background:var(--line);margin:0 auto 16px}
.field{font-size:12px;color:var(--muted);display:block;margin-bottom:12px}
.field input{width:100%;margin-top:6px;padding:13px;border-radius:12px;background:var(--card2);border:1px solid var(--line);color:var(--txt);font-size:15px;font-weight:600}
.photo-pick{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.photo-pick .pfp{width:60px;height:60px;font-size:20px}
.photo-pick label{font-size:12.5px;color:var(--acc);font-weight:600;padding:9px 13px;border:1px solid var(--acc-dim);border-radius:10px;background:var(--acc-soft)}
.photo-pick input{display:none}

.toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:600;padding:12px 18px;border-radius:100px;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.3s;display:flex;align-items:center;gap:8px;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .icon{color:var(--ok)}
</style>

const KEY='eleva_state_v2';
function todayISO(){return new Date().toISOString().slice(0,10);}
function nowHora(){return new Date().toTimeString().slice(0,5);}

  perfil:{nombre:'Jugador',posicion:'Poste / Alero',autor:'',foto:null,edad:null,peso:null,altura:null,

/* ejercicios que usan carga externa (kg) */
const WEIGHTED=new Set(['Sentadilla trasera con barra','Peso muerto rumano','Prensa de piernas','Zancada búlgara con mancuernas','Elevación de gemelos de pie','Press de banca (barra o mancuernas)','Remo con barra','Press militar de pie','Face pull','Lanzamiento de balón medicinal (slam)']);
function needsWeight(n){return WEIGHTED.has(n);}
function logCarga(name,kg){if(!kg||isNaN(kg))return;S.cargas[name]=S.cargas[name]||[];const t=todayISO();const ex=S.cargas[name].find(c=>c.fecha===t);if(ex)ex.kg=kg;else S.cargas[name].push({fecha:t,kg:kg});save();}
function bestCarga(name){const a=S.cargas[name];if(!a||!a.length)return null;return Math.max(...a.map(c=>c.kg));}
function lastCarga(name){const a=S.cargas[name];if(!a||!a.length)return null;return a[a.length-1].kg;}
function kilosMes(){const now=new Date(),m=now.getMonth(),y=now.getFullYear();let tot=0;
  for(const n in S.cargas)S.cargas[n].forEach(c=>{const d=new Date(c.fecha+'T00:00');if(d.getMonth()===m&&d.getFullYear()===y)tot+=c.kg;});
  return tot;}
function cardioMesMin(){const now=new Date(),m=now.getMonth(),y=now.getFullYear();let min=0;
  S.historial.forEach(h=>{if(h.tipo==='cardio'){const d=new Date(h.fecha+'T00:00');if(d.getMonth()===m&&d.getFullYear()===y){const mt=(h.sub||'').match(/(\d+)\s*min/);if(mt)min+=parseInt(mt[1]);}}});return min;}
function countMesOffset(off){const now=new Date();const m=now.getMonth()+off,ref=new Date(now.getFullYear(),m,1);const mm=ref.getMonth(),yy=ref.getFullYear();
  return S.historial.filter(h=>{const d=new Date(h.fecha+'T00:00');return d.getMonth()===mm&&d.getFullYear()===yy;}).length;}
function numOf(x){if(x===null||x===undefined||x==='')return 0;const v=parseFloat((''+x).replace(',','.'));return isNaN(v)?0:v;}
function backupDue(){if(!S.lastBackup)return S.historial.length>0;const d=(new Date(todayISO())-new Date(S.lastBackup))/86400000;return d>=7;}
let S=load();
function load(){try{const r=JSON.parse(localStorage.getItem(KEY));return r?deepMerge(JSON.parse(JSON.stringify(DEFAULT)),r):JSON.parse(JSON.stringify(DEFAULT));}catch(e){return JSON.parse(JSON.stringify(DEFAULT));}}
function deepMerge(a,b){for(const k in b){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])){a[k]=deepMerge(a[k]||{},b[k]);}else{a[k]=b[k];}}return a;}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){toast('Sin espacio para guardar la foto');}}
function todayEntry(){return WEEK[(new Date().getDay()+6)%7];}

const MESES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const MESES_L=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function fmtRel(iso){const d=new Date(iso+'T00:00'),t=new Date(todayISO()+'T00:00');const diff=Math.round((t-d)/86400000);
  if(diff===0)return'Hoy';if(diff===1)return'Ayer';if(diff<7)return'Hace '+diff+' días';return d.getDate()+' '+MESES[d.getMonth()];}
function fmtFecha(iso){const d=new Date(iso+'T00:00');return d.getDate()+' '+MESES[d.getMonth()]+' '+d.getFullYear();}
function streak(){const set=new Set(S.historial.map(h=>h.fecha));let n=0,d=new Date();
  if(!set.has(d.toISOString().slice(0,10)))d.setDate(d.getDate()-1);
  while(set.has(d.toISOString().slice(0,10))){n++;d.setDate(d.getDate()-1);}return n;}
function mesCount(){const now=new Date(),m=now.getMonth(),y=now.getFullYear();
  return S.historial.filter(h=>{const d=new Date(h.fecha+'T00:00');return d.getMonth()===m&&d.getFullYear()===y;}).length;}
function pfpColor(name){const c=['#FF6A2C','#5AA9E6','#3FB68B','#C86BE0','#E6B45A'];let s=0;for(const ch of(name||'J'))s+=ch.charCodeAt(0);return c[s%c.length];}
function avatarHTML(size){const p=S.perfil;if(p.foto)return `<div class="pfp" style="width:${size}px;height:${size}px"><img src="${p.foto}"></div>`;
  return `<div class="pfp" style="width:${size}px;height:${size}px;background:${pfpColor(p.nombre)};font-size:${size/2.9}px">${(p.nombre[0]||'J').toUpperCase()}</div>`;}
function imc(){const p=S.perfil;if(!p.peso||!p.altura)return null;const h=p.altura/100;return p.peso/(h*h);}
function imcCat(v){if(v<18.5)return['Bajo peso','#5AA9E6'];if(v<25)return['Normal','#3FB68B'];if(v<30)return['Sobrepeso','#E6B45A'];return['Obesidad','#E06B6B'];}
const val=x=>(x!==null&&x!==undefined&&x!=='')?x:'—';

const app=document.getElementById('app');
function render(){const v=S.view;
  if(v==='hoy')renderHoy();else if(v==='entreno')renderEntreno();else if(v==='progreso')renderProgreso();
  else if(v==='retos')renderRetos();else if(v==='perfil')renderPerfil();
  renderNav();window.scrollTo(0,0);}
function header(hi,title,avatar){return `<div class="header"><div><div class="hi">${hi}</div><h1>${title}</h1></div>
  ${avatar!==false?`<button class="avatar" onclick="go('perfil')">${S.perfil.foto?`<img src="${S.perfil.foto}">`:svg('user')}</button>`:''}</div>`;}

function renderHoy(){
  const e=todayEntry(),st=streak(),mc=mesCount();
  let hero;
  if(e.type==='gym'){const p=PROGRAM[e.pid],doneN=Object.values(S.done[e.pid]||{}).filter(Boolean).length;
    hero=`<div class="hero"><span class="tag">${svg('bolt','sm')} Sesión de hoy · ${p.dia}</span>
      <h3>${p.foco}</h3><p>${p.obj}</p>
      <div class="meta"><div><b>${p.ejercicios.length}</b><span>ejercicios</span></div><div><b>~55 min</b><span>duración</span></div><div><b>${doneN}/${p.ejercicios.length}</b><span>completados</span></div></div>
      <button class="btn" onclick="openDay(${e.pid})">${svg('play','sm')} ${doneN>0?'Continuar entrenamiento':'Iniciar entrenamiento'}</button></div>`;
  }else if(e.type==='libre'){
    hero=`<div class="hero court"><span class="tag">${svg('ball','sm')} Día libre</span>

const LOGMAP={gym:['dumbbell','gym','Gimnasio'],clase:['aerobic','clase','Clase'],bball:['ball','bball','Baloncesto'],cardio:['cardio','cardio','Cardio']};
function logRow(h){const[ic,cls,lbl]=LOGMAP[h.tipo]||['dumbbell','gym','Actividad'];
  const sub=h.sub?`<div class="log-sub">${h.sub}</div>`:'';
  return `<div class="log-item" style="cursor:pointer" onclick="openDaySummary('${h.fecha}')"><div class="log-ic ${cls}">${svg(ic,'sm')}</div><div class="t"><b>${h.detalle}</b><span>${lbl}</span>${sub}</div><div class="day">${fmtRel(h.fecha)}${svg('chevron','sm')}</div></div>`;}
function openDaySummary(fecha){const its=S.historial.filter(h=>h.fecha===fecha);const cargasDia=[];
  for(const n in S.cargas)S.cargas[n].forEach(c=>{if(c.fecha===fecha)cargasDia.push([n,c.kg]);});
  let body='';
  if(its.length){const rows=its.map(h=>{const[ic,cls,lbl]=LOGMAP[h.tipo]||['dumbbell','gym','Actividad'];
    return `<div class="log-item"><div class="log-ic ${cls}">${svg(ic,'sm')}</div><div class="t"><b>${h.detalle}</b><span>${lbl}${h.hora?' · '+h.hora:''}</span>${h.sub?`<div class="log-sub">${h.sub}</div>`:''}${h.notas?`<div class="log-sub">“${h.notas}”</div>`:''}</div></div>`;}).join('');
    body+=`<div class="card" style="padding:4px 16px;margin-bottom:12px">${rows}</div>`;}
  if(cargasDia.length){const rows=cargasDia.map(([n,kg])=>`<div class="rec"><div class="t"><b>${n}</b><span>Carga registrada</span></div><div class="val">${kg}<small> kg</small></div></div>`).join('');
    body+=`<div class="section-title" style="margin:2px 2px 8px"><h2>Pesos del día</h2></div><div class="card" style="padding:4px 16px">${rows}</div>`;}
  if(!its.length&&!cargasDia.length)body='<p class="sub">No hay registros de este día.</p>';
  const del=its.length?`<div style="height:14px"></div><button class="btn ghost" onclick="delDay('${fecha}')">${svg('close','sm')} Eliminar registros de este día</button>`:'';
  document.getElementById('sheet').innerHTML='<div class="grip"></div><h3>'+fmtFecha(fecha)+'</h3><p class="sub">Resumen del día</p>'+body+del;openSheet();}
function delDay(fecha){S.historial=S.historial.filter(h=>h.fecha!==fecha);save();closeSheet();toast('Registros eliminados');render();}
function recentList(n){
  if(!S.historial.length)return `<div class="card"><div class="empty">${svg('calendar')}<b>Aún no hay registros</b><p>Cuando entrenes o juegues, tu actividad aparecerá aquí.</p></div></div>`;
  return `<div class="card" style="padding:4px 16px">${S.historial.slice(0,n).map(logRow).join('')}</div>`;}

function stretchBlock(kind){
  const list=kind==='pre'?STRETCH_PRE:STRETCH_POST;
  const title=kind==='pre'?'Estiramientos previos':'Estiramientos posteriores';
  const sub=kind==='pre'?'Dinámicos · prepara el cuerpo antes de entrenar':'Estáticos · para recuperar después del entreno';
  const ic=kind==='pre'?'stretch':'stretch';
  const items=list.map((s,idx)=>`<div class="st-item"><div class="t"><b>${s.n}</b><span>${s.d}</span></div>
    <div class="st-act">
      <button class="tplay" onclick="event.preventDefault();startTimerOne('${kind}',${idx})" title="Temporizador">${svg('clock','sm')}</button>
      <a href="${YT(s.q)}" target="_blank" rel="noopener" title="Video">${svg('video','sm')}</a>
    </div></div>`).join('');
  return `<details class="stretch ${kind}">
    <summary><div class="s-ic">${svg(ic,'sm')}</div><div class="s-tt"><b>${title}</b><span>${sub}</span></div>${svg('chevron','sm chev')}</summary>
    <div class="s-body">
      <button class="btn sm ${kind==='pre'?'blue':''}" style="margin:6px 0 2px" onclick="event.preventDefault();startTimer('${kind}')">${svg('clock','sm')} Iniciar rutina guiada</button>
      ${items}</div></details>`;
}

    +cargasSection()

function cargasSection(){const names=Object.keys(S.cargas||{}).filter(n=>S.cargas[n]&&S.cargas[n].length);
  if(!names.length)return '';
  const rows=names.map(n=>`<div class="rec"><div class="t"><b>${n}</b><span>Récord de carga</span></div><div class="val">${bestCarga(n)}<small> kg</small></div></div>`).join('');
  return `<div class="section"><div class="section-title"><h2>Récords de carga</h2><span class="link" style="color:var(--muted)">${kilosMes()} kg este mes</span></div><div class="card" style="padding:4px 16px">${rows}</div></div>`;}
function calendar(){const now=new Date(),y=now.getFullYear(),m=now.getMonth(),first=new Date(y,m,1).getDay(),off=(first+6)%7,days=new Date(y,m+1,0).getDate(),byDate={};
  S.historial.forEach(h=>{const d=new Date(h.fecha+'T00:00');if(d.getMonth()===m&&d.getFullYear()===y)byDate[d.getDate()]=h.tipo;});
  const td=now.getDate();let g='<div class="cal"><div class="cal-head"><b>'+MESES_L[m]+' '+y+'</b></div><div class="cal-grid">';
  ['L','M','M','J','V','S','D'].forEach(w=>g+='<div class="wd">'+w+'</div>');
  for(let i=0;i<off;i++)g+='<div class="cell empty"></div>';
  const pad=n=>(n<10?'0'+n:''+n);
  for(let d=1;d<=days;d++){const t=byDate[d];const iso=y+'-'+pad(m+1)+'-'+pad(d);
    g+=`<div class="cell ${d===td?'today':''}" ${t?`style="cursor:pointer" onclick="openDaySummary('${iso}')"`:''}>${d}${t?`<span class="dot ${t}"></span>`:''}</div>`;}
  g+='</div><div class="legend"><span><i style="background:var(--acc)"></i>Gimnasio</span><span><i style="background:var(--blue)"></i>Clase</span><span><i style="background:var(--ok)"></i>Baloncesto</span><span><i style="background:var(--purple)"></i>Cardio</span></div></div>';return g;}
function fullLog(){
  if(!S.historial.length)return `<div class="card"><div class="empty">${svg('chart')}<b>Historial vacío</b><p>Registra tu primera actividad con el botón "Registrar" o guardando una sesión de entreno.</p></div></div>`;

function renderRetos(){

      lead+=`<div class="lead-item" ${f.me?'':`style="cursor:pointer" onclick="openFriend('${f.id}')"`}><div class="rank ${i===0?'top':''}">${i+1}</div>${av}
      <div class="t"><b>${f.nombre}${f.me?' (tú)':''}</b><span>Salto ${val(f.salto)} cm · ${numOf(f.sesiones)} ses.</span></div>

function saveFriend(id){const g=x=>{const el=document.getElementById(x);return el?el.value.trim():'';};

/* ===== Temporizador de estiramientos ===== */
let actx;
function beep(count,freq,dur){count=count||1;freq=freq||880;dur=dur||0.13;
  try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();
    let t=actx.currentTime;
    for(let i=0;i<count;i++){const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=freq;o.connect(g);g.connect(actx.destination);
      g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.22,t+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.start(t);o.stop(t+dur+0.02);t+=dur+0.09;}
  }catch(e){}
}
let T={phases:[],idx:0,left:0,int:null,paused:false};
function buildPhases(list,kind){const work=kind==='pre'?20:30,change=kind==='pre'?8:10,phases=[];
  list.forEach((s,i)=>{const two=/lado|pierna/i.test(s.d);
    if(two){phases.push({name:s.n,sub:'Lado derecho',secs:work,type:'work'});
      phases.push({name:s.n,sub:'Cambia de lado',secs:change,type:'change'});
      phases.push({name:s.n,sub:'Lado izquierdo',secs:work,type:'work'});}
    else{phases.push({name:s.n,sub:'Mantén la posición',secs:work,type:'work'});}
    if(i<list.length-1)phases.push({name:'Transición',sub:'Prepárate para el siguiente',secs:change,type:'change'});});
  return phases;}
function startTimer(kind){const list=kind==='pre'?STRETCH_PRE:STRETCH_POST;runPhases(buildPhases(list,kind));}
function startTimerOne(kind,idx){const list=kind==='pre'?STRETCH_PRE:STRETCH_POST;runPhases(buildPhases([list[idx]],kind));}
function runPhases(phases){if(!phases.length)return;T.phases=phases;T.idx=0;T.paused=false;beep();document.getElementById('timer').classList.add('open');startPhase();}
function startPhase(){const p=T.phases[T.idx];if(!p){finishTimer();return;}T.left=p.secs;
  beep(p.type==='change'?2:1,p.type==='change'?660:880);drawTimer();
  clearInterval(T.int);T.int=setInterval(tick,1000);}
function tick(){if(T.paused)return;T.left--;if(T.left<=0){T.idx++;if(T.idx>=T.phases.length){finishTimer();return;}startPhase();return;}drawTimer();}
function pauseTimer(){T.paused=!T.paused;drawTimer();}
function skipPhase(){T.idx++;if(T.idx>=T.phases.length){finishTimer();return;}startPhase();}
function finishTimer(){clearInterval(T.int);beep(3,900,0.16);closeTimer();toast('Estiramiento completado');}
function closeTimer(){clearInterval(T.int);document.getElementById('timer').classList.remove('open');}
function drawTimer(){const p=T.phases[T.idx];if(!p)return;const r=98,c=2*Math.PI*r,off=c*(1-T.left/p.secs),col=p.type==='change'?'var(--blue)':'var(--acc)';
  document.getElementById('tmInner').innerHTML=`
    <div class="tm-step">Paso ${T.idx+1} de ${T.phases.length}</div>
    <div class="tm-name">${p.name}</div>
    <div class="tm-ringwrap"><svg width="230" height="230" viewBox="0 0 230 230">
      <circle cx="115" cy="115" r="98" fill="none" stroke="var(--card2)" stroke-width="14"/>
      <circle cx="115" cy="115" r="98" fill="none" stroke="${col}" stroke-width="14" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
    </svg><div class="tm-num" style="color:${col}">${T.left}</div></div>
    <div class="tm-sub">${p.sub}</div>
    <div class="tm-controls">
      <button onclick="pauseTimer()">${svg(T.paused?'play':'pause','sm')} ${T.paused?'Seguir':'Pausa'}</button>
      <button onclick="skipPhase()">${svg('skip','sm')} Saltar</button>
      <button class="primary" onclick="closeTimer()">${svg('close','sm')} Salir</button>
    </div>`;}

function roundRect(x,X,Y,w,h,r){x.beginPath();x.moveTo(X+r,Y);x.arcTo(X+w,Y,X+w,Y+h,r);x.arcTo(X+w,Y+h,X,Y+h,r);x.arcTo(X,Y+h,X,Y,r);x.arcTo(X,Y,X+w,Y,r);x.closePath();}

  for(const w of words){const test=line+w+' ';if(x.measureText(test).width>maxW&&line){x.fillText(line.trim(),X,yy);line=w+' ';yy+=lh;}else line=test;}

function genSummary(cb){const fmt=shareState.fmt,W=1080,H=fmt==='post'?1080:1920;

function drawPhoto(x,cx,cy,r,img){
  if(img){x.save();x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.closePath();x.clip();
    const s=Math.max((2*r)/img.width,(2*r)/img.height),dw=img.width*s,dh=img.height*s;x.drawImage(img,cx-dw/2,cy-dh/2,dw,dh);x.restore();
    x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.lineWidth=9;x.strokeStyle='#FF6A2C';x.stroke();
  }else{x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.fillStyle='#1F222A';x.fill();
    x.fillStyle=pfpColor(S.perfil.nombre);x.textAlign='center';x.textBaseline='middle';x.font='800 '+Math.round(r)+'px Inter, Arial, sans-serif';x.fillText((S.perfil.nombre[0]||'J').toUpperCase(),cx,cy+6);x.textBaseline='alphabetic';}}
function drawSummary(x,W,H,img){const cx=W/2,tall=H>1200;
  x.textBaseline='alphabetic';
  x.textAlign='left';x.fillStyle='#FF6A2C';x.font='800 60px Inter, Arial, sans-serif';x.fillText('ELEVA',72,tall?128:112);
  x.fillStyle='#9AA0AD';x.font='500 27px Inter, Arial, sans-serif';x.fillText('Rendimiento para baloncesto',72,tall?168:150);
  x.textAlign='right';x.fillStyle='#C9CED8';x.font='700 30px Inter, Arial, sans-serif';x.fillText(fechaLarga(),W-72,tall?122:106);
  x.fillStyle='#6B7280';x.font='500 26px Inter, Arial, sans-serif';x.fillText(nowHora(),W-72,tall?160:142);
  const r=tall?210:150,cy=tall?545:345;
  drawPhoto(x,cx,cy,r,img);
  x.textAlign='center';x.fillStyle='#F4F5F7';x.font='800 '+(tall?58:48)+'px Inter, Arial, sans-serif';x.fillText(S.perfil.nombre,cx,cy+r+(tall?96:78));
  x.fillStyle='#9AA0AD';x.font='500 '+(tall?32:28)+'px Inter, Arial, sans-serif';x.fillText(S.perfil.posicion,cx,cy+r+(tall?146:118));
  const stats=[[String(streak()),'Racha'],[String(mesCount()),'Sesiones mes'],[String(val(S.perfil.records.salto)),'Salto (cm)'],[String(val(S.perfil.records.sprint)),'Sprint 20m'],[String(Math.round(kilosMes())||0),'Kg del mes'],[String(cardioMesMin()||0),'Cardio min']];
  const gx=(W-144)/3,x0=72,sy=cy+r+(tall?250:208),rowH=tall?150:128;
  stats.forEach((st,i)=>{const col=i%3,row=Math.floor(i/3),px=x0+gx*col+gx/2,py=sy+row*rowH;
    x.fillStyle='#FF6A2C';x.font='800 '+(tall?64:52)+'px Inter, Arial, sans-serif';x.textAlign='center';x.fillText(st[0],px,py);
    x.fillStyle='#9AA0AD';x.font='600 '+(tall?26:22)+'px Inter, Arial, sans-serif';x.fillText(st[1],px,py+(tall?42:34));});
  const footY=H-(tall?150:66);
  if(tall){const ty=sy+2*rowH+34,bh=205;
    x.fillStyle='#181A20';roundRect(x,72,ty,W-144,bh,26);x.fill();
    x.textAlign='left';x.fillStyle='#6B7280';x.font='700 25px Inter, Arial, sans-serif';x.fillText('LO DE HOY',112,ty+54);
    x.fillStyle='#F4F5F7';x.font='700 40px Inter, Arial, sans-serif';wrapText(x,resumenHoy(),112,ty+112,W-224,50);}
  const autor=(S.perfil.autor&&S.perfil.autor.trim())?S.perfil.autor.trim():S.perfil.nombre;
  x.textAlign='center';x.fillStyle='#8A909C';x.font='700 27px Inter, Arial, sans-serif';x.fillText('Creado con ELEVA',cx,footY);
  x.fillStyle='#6B7280';x.font='500 24px Inter, Arial, sans-serif';x.fillText('por '+autor,cx,footY+(tall?38:30));}
function openShare(){document.getElementById('sheet').innerHTML='<div class="grip"></div><h3>Compartir resumen</h3><p class="sub">Genera una imagen de tu día para WhatsApp o Instagram.</p>'
  +`<div class="chips" id="fmtChips"><button class="chip-sel ${shareState.fmt==='story'?'on':''}" onclick="setFmt(this,'story')">Historia 9:16</button><button class="chip-sel ${shareState.fmt==='post'?'on':''}" onclick="setFmt(this,'post')">Cuadrado 1:1</button></div>`
  +`<div style="text-align:center;margin-bottom:14px"><img id="shPreview" style="max-width:190px;width:100%;border-radius:14px;border:1px solid var(--line)"></div>`
  +`<div class="photo-pick"><label>${svg('camera','sm')} ${shareState.foto?'Cambiar foto':'Agregar foto'}<input type="file" accept="image/*" onchange="pickSharePhoto(this)"></label>${shareState.foto?`<button class="chip-sel" onclick="clearSharePhoto()">Quitar foto</button>`:(S.perfil.foto?'<span style="font-size:11.5px;color:var(--dim)">Usando tu foto de perfil</span>':'')}</div>`
  +`<button class="btn" onclick="shareImage()">${svg('share','sm')} Compartir</button>`
  +`<div style="height:10px"></div><button class="btn ghost" onclick="downloadImage()">${svg('download','sm')} Descargar imagen</button>`;
  openSheet();refreshPreview();}
function setFmt(btn,f){shareState.fmt=f;document.querySelectorAll('#fmtChips .chip-sel').forEach(b=>b.classList.remove('on'));btn.classList.add('on');refreshPreview();}
function refreshPreview(){genSummary(c=>{const el=document.getElementById('shPreview');if(el)el.src=c.toDataURL('image/png');});}
function pickSharePhoto(input){const f=input.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const max=720;let w=img.width,h=img.height;const sc=Math.min(max/w,max/h,1);c.width=Math.round(w*sc);c.height=Math.round(h*sc);c.getContext('2d').drawImage(img,0,0,c.width,c.height);shareState.foto=c.toDataURL('image/jpeg',.85);openShare();};img.src=e.target.result;};
  rd.readAsDataURL(f);}
function clearSharePhoto(){shareState.foto=null;openShare();}
function downloadBlob(b,name){const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name||'eleva-resumen.png';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1200);}
function shareImage(){genSummary(c=>{if(!c.toBlob){const url=c.toDataURL('image/png');const a=document.createElement('a');a.href=url;a.download='eleva-resumen.png';a.click();toast('Imagen descargada');return;}
  c.toBlob(async b=>{const file=new File([b],'eleva-resumen.png',{type:'image/png'});
    try{if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'Mi día en ELEVA',text:'Mi progreso en ELEVA'});}
      else{downloadBlob(b);toast('Imagen descargada, compártela donde quieras');}}catch(e){}
  },'image/png');});}
function downloadImage(){genSummary(c=>{c.toBlob(b=>{downloadBlob(b);toast('Imagen descargada');},'image/png');});}

/* backup */
function exportData(){const blob=new Blob([JSON.stringify(S)],{type:'application/json'});downloadBlob(blob,'eleva-backup-'+todayISO()+'.json');S.lastBackup=todayISO();save();toast('Backup exportado');render();}
function importData(input){const f=input.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=e=>{try{const parsed=JSON.parse(e.target.result);if(!parsed||typeof parsed!=='object')throw 0;S=deepMerge(JSON.parse(JSON.stringify(DEFAULT)),parsed);save();closeSheet();toast('Datos restaurados');render();}catch(err){toast('Archivo no válido');}};
  rd.readAsText(f);}

let _lastDay=todayISO();
setInterval(()=>{const t=todayISO();if(t!==_lastDay){_lastDay=t;render();}},30000);

render();
</script>
